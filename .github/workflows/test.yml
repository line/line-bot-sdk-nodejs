name: Test

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        # https://nodejs.org/en/about/releases/
        node:
          - '20'
          - '20.12.2'
          - '22'
          - '24'
      fail-fast: false

    name: Node.js ${{ matrix.node }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: 17
          architecture: x64
      - uses: ./.github/actions/setup-node-and-npm
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - name: Install Dependency
        run: npm ci
      - name: Test generator
        run: cd generator; mvn package; cd ..
      - name: Generate code
        run: |
          python3 generate-code.py
      - name: Test Project
        run: export NODE_OPTIONS=--max-old-space-size=6144; npm test
      - name: Test building apidocs
        run: export NODE_OPTIONS=--openssl-legacy-provider; npm run apidocs
      - name: Test building docs
        run: export NODE_OPTIONS=--openssl-legacy-provider; npm run docs:build
      - name: Test building examples (CJS)
        run: |
          cd examples/echo-bot-ts-cjs
          npm run build-sdk
          npm install
          npm run build
          cd -
      - name: Test building examples (ESM)
        run: |
          cd examples/echo-bot-ts-esm
          npm run build-sdk
          npm install
          npm run build
          cd -
      - name: publint
        run: npm run check:publint
      - name: validate package
        run: npm run check:attw

  pinact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run pinact
        uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          skip_push: "true"
